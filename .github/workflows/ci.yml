name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Compile-Check
        run: python -m py_compile periscan.py webapp.py fingerprints.py
      - name: Unit-Tests
        run: python -m unittest discover -s tests -v
